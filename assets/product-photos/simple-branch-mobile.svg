<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
<title id="title">Finished Simple Branch Mobile project preview</title>
<desc id="desc">A large clear Crafties finished-project preview illustration for the Wood pattern Simple Branch Mobile, styled as a photographed craft on a tabletop card with texture, shadows, and highlights.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffdf8"/><stop offset=".42" stop-color="#ffbd72"/><stop offset="1" stop-color="#efe0ff"/></linearGradient>
  <linearGradient id="table" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#fff8df"/><stop offset="1" stop-color="#f0d7ff"/></linearGradient>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" seed="68"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .07"/></feComponentTransfer></filter>
  <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#53138f" flood-opacity=".18"/></filter>
  <filter id="objectShadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#321441" flood-opacity=".28"/></filter>
</defs>
<rect width="900" height="680" rx="72" fill="url(#table)"/>
<rect width="900" height="680" rx="72" fill="url(#bg)" opacity=".74"/>
<rect width="900" height="680" rx="72" filter="url(#grain)" opacity=".9"/>
<ellipse cx="454" cy="580" rx="330" ry="48" fill="#53138f" opacity=".14"/>
