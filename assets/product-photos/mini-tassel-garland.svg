<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
<title id="title">Finished Mini Tassel Garland project preview</title>
<desc id="desc">A large clear Crafties finished-project preview illustration for the Yarn pattern Mini Tassel Garland, styled as a photographed craft on a tabletop card with texture, shadows, and highlights.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffdf8"/><stop offset=".42" stop-color="#f4b4ff"/><stop offset="1" stop-color="#efe0ff"/></linearGradient>
